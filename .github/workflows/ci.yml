name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Ruff check
        run: uv run --extra dev ruff check src tests
      - name: Ruff format check
        run: uv run --extra dev ruff format --check src tests
      - name: Compile
        run: uv run python -m compileall -q src tests
      - name: Tests
        run: uv run --extra dev pytest tests/ --cov=agent_evaluation_lab --cov-report=xml --cov-report=term-missing
